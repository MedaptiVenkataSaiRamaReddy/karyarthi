# ════════════════════════════════════════════════════════════════
#  Karyarthi — GitHub Actions CI/CD
#  Builds and pushes Docker image → Railway auto-deploys from it
# ════════════════════════════════════════════════════════════════
name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup ─────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Build frontend ─────────────────────────────────────────
      - name: Build Vite frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          echo "✅ Frontend built"

      # ── Test backend ───────────────────────────────────────────
      - name: Run backend tests
        run: ./mvnw test -q
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/karyarthi_test

      # ── Build backend JAR ──────────────────────────────────────
      - name: Build Spring Boot JAR
        run: ./mvnw package -DskipTests -q
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/karyarthi_build

      # ── Deploy to Railway (on main branch only) ────────────────
      - name: Deploy to Railway
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: railwayapp/railway-github-action@v1.0.0
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
          service: karyarthi-backend
